name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Markdown & Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Markdown lint (product layer)
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            rules/**/*.md
            skills/**/*.md
            knowledge/**/*.md

      - name: Check layer separation
        run: |
          result=$(grep -r "docs/\|\.claude/" rules/ skills/ knowledge/ 2>/dev/null || true)
          if [ -n "$result" ]; then
            echo "::error::Layer separation violation — product layer references dev layer"
            echo "$result"
            exit 1
          fi
          echo "Layer separation check passed"

  test:
    name: Static Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run static tests
        run: pytest tests/static/ -v

  hooks:
    name: Hook Tests (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run hook tests
        run: |
          PASS=0
          FAIL=0
          for f in tests/hooks/test_*.mjs; do
            [ -f "$f" ] || continue
            if node --test "$f" > /dev/null 2>&1; then
              PASS=$((PASS + 1))
            else
              echo "FAIL: $f"
              node --test "$f" 2>&1 | tail -20
              FAIL=$((FAIL + 1))
            fi
          done
          echo "Hook tests: $PASS passed, $FAIL failed"
          [ "$FAIL" -eq 0 ]
